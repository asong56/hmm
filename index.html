<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hmm</title>
  <link rel="stylesheet" href="src/scss/main.css" />
</head>
<body>
  <div id="app" data-mode="edit">

    <div id="controls">
      <button id="btn-open"  title="Open (Ctrl+O)"  aria-label="Open file">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 19V7a2 2 0 0 1 2-2h4l2 2h5a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5Z"/>
        </svg>
      </button>
      <button id="btn-save"  title="Save (Ctrl+S)"  aria-label="Save file">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/>
          <path d="M15 3v6H9V3"/><path d="M8 17h8"/><path d="M8 13h8"/>
        </svg>
      </button>
      <button id="btn-read"  title="Read (Ctrl+R)"  aria-label="Toggle reading mode">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </button>
      <button id="btn-theme" title="Toggle theme"   aria-label="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      </button>
    </div>

    <div id="editor-wrap">
      <textarea
        id="editor"
        spellcheck="true"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="Start writing…"
        aria-label="Markdown editor"
      ></textarea>
    </div>

    <div id="reader" aria-hidden="true">
      <article id="reader-content"></article>
    </div>

  </div>

  <div id="drop-overlay" aria-hidden="true">
    <span>Drop Markdown file</span>
  </div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
